openapi: 3.1.0
info:
  title: SELKOP Online & QR Store API
  version: 1.0.0-alpha
  description: API contract for SELKOP Online Store, QR Store, Admin Dashboard, and Payment Webhooks.
servers:
  - url: http://localhost:5000/api/v1
    description: Local development
  - url: https://sandbox-api.selkop.com/api/v1
    description: Sandbox
  - url: https://api.selkop.com/api/v1
    description: Production
tags:
  - name: Public Storefront
  - name: Public QR
  - name: Public Cart
  - name: Public Checkout
  - name: Public Payment
  - name: Public Order
  - name: Admin Orders
  - name: Admin Products
  - name: Admin QR
  - name: Admin Settings
  - name: Webhooks
  - name: Internal
paths:
  /public/stores/{storefrontSlug}:
    get:
      tags:
        - Public Storefront
      operationId: getPublicStorefront
      summary: Get public storefront
      description: Loads storefront metadata, active outlets, and customer-safe menu data.
      parameters:
        - $ref: '#/components/parameters/StorefrontSlug'
        - name: outlet_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional outlet filter for outlet-aware menu availability.
      responses:
        '200':
          description: Public storefront loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorefrontResponse'
              examples:
                success:
                  value:
                    storefront:
                      id: 01900000-0000-7000-8000-000000000001
                      slug: selkop
                      name: SELKOP
                      brandline: Born Local For Everyone
                      ordering_enabled: true
                    outlets:
                      - id: 01900000-0000-7000-8000-000000000010
                        name: SELKOP Samarinda
                        is_open: true
                    menu:
                      categories: []
                      products: []
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
  /public/storefronts/{storefrontSlug}:
    get:
      tags:
        - Public Storefront
      operationId: getPublicStorefrontAlias
      summary: Get public storefront alias
      description: Explicit storefront alias for storefront loading. Runtime alpha also supports `/public/stores/{storefrontSlug}` under the same server prefix.
      parameters:
        - $ref: '#/components/parameters/StorefrontSlug'
      responses:
        '200':
          description: Public storefront loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorefrontResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /public/qr/{qrToken}:
    get:
      tags:
        - Public QR
      operationId: getPublicQRCode
      summary: Resolve public QR code
      description: Resolves QR token, validates state, creates or refreshes QR session, and returns store context.
      parameters:
        - $ref: '#/components/parameters/QrToken'
      responses:
        '200':
          description: QR context resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QRResolveResponse'
              examples:
                universal:
                  $ref: '#/components/examples/UniversalQRResponse'
                outlet:
                  $ref: '#/components/examples/OutletQRResponse'
                location:
                  $ref: '#/components/examples/LocationQRResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/QRInvalid'
        '429':
          $ref: '#/components/responses/RateLimited'
  /public/carts/validate:
    post:
      tags:
        - Public Cart
      operationId: validatePublicCart
      summary: Validate public cart
      description: Validates cart selections, product availability, outlet compatibility, modifiers, and backend-authoritative totals.
      security:
        - QrSessionToken: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartValidateRequest'
            examples:
              cart:
                $ref: '#/components/examples/CartValidateRequest'
      responses:
        '200':
          description: Cart validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartValidateResponse'
              examples:
                valid:
                  $ref: '#/components/examples/CartValidateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
  /public/checkout:
    post:
      tags:
        - Public Checkout
      operationId: createPublicCheckout
      summary: Create public checkout
      description: Validates cart, creates immutable order snapshot and payment attempt, then returns payment and public order tracking data.
      security:
        - IdempotencyKey: []
        - QrSessionToken: []
        - IdempotencyKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            examples:
              checkout:
                $ref: '#/components/examples/CheckoutRequest'
      responses:
        '201':
          description: Checkout created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
              examples:
                created:
                  $ref: '#/components/examples/CheckoutResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/PaymentProviderError'
  /public/payments/{paymentId}/status:
    get:
      tags:
        - Public Payment
      operationId: getPublicPaymentStatus
      summary: Get public payment status
      description: Read-only payment status endpoint for frontend polling. It cannot mark payment as paid.
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Public payment status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentStatusResponse'
              examples:
                pending:
                  $ref: '#/components/examples/PaymentPendingResponse'
                paid:
                  $ref: '#/components/examples/PaymentPaidResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
  /public/orders/{publicOrderToken}:
    get:
      tags:
        - Public Order
      operationId: getPublicOrder
      summary: Get public order status
      description: Returns customer-safe order status by opaque public order token.
      parameters:
        - $ref: '#/components/parameters/PublicOrderToken'
      responses:
        '200':
          description: Public order status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicOrderEnvelope'
              examples:
                order:
                  $ref: '#/components/examples/PublicOrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
  /admin/orders:
    get:
      tags:
        - Admin Orders
      operationId: listAdminOrders
      summary: List admin orders
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: outlet_id
          in: query
          schema:
            type: string
            format: uuid
        - name: payment_status
          in: query
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - name: fulfillment_status
          in: query
          schema:
            $ref: '#/components/schemas/FulfillmentStatus'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Admin order list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/orders/{orderId}:
    get:
      tags:
        - Admin Orders
      operationId: getAdminOrder
      summary: Get admin order detail
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Admin order detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetailResponse'
              examples:
                detail:
                  $ref: '#/components/examples/AdminOrderDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/orders/{orderId}/accept:
    post:
      tags:
        - Admin Orders
      operationId: acceptAdminOrder
      summary: Accept admin order
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        $ref: '#/components/requestBodies/AdminOrderActionRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AdminOrderActionSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/OrderInvalidTransition'
  /admin/orders/{orderId}/prepare:
    post:
      tags:
        - Admin Orders
      operationId: prepareAdminOrder
      summary: Mark admin order preparing
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        $ref: '#/components/requestBodies/AdminOrderActionRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AdminOrderActionSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/OrderInvalidTransition'
  /admin/orders/{orderId}/ready:
    post:
      tags:
        - Admin Orders
      operationId: readyAdminOrder
      summary: Mark admin order ready
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        $ref: '#/components/requestBodies/AdminOrderActionRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AdminOrderActionSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/OrderInvalidTransition'
  /admin/orders/{orderId}/complete:
    post:
      tags:
        - Admin Orders
      operationId: completeAdminOrder
      summary: Complete admin order
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        $ref: '#/components/requestBodies/AdminOrderActionRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AdminOrderActionSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/OrderInvalidTransition'
  /admin/orders/{orderId}/cancel:
    post:
      tags:
        - Admin Orders
      operationId: cancelAdminOrder
      summary: Cancel admin order
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCancelOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/AdminOrderActionSuccess'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/OrderInvalidTransition'
  /admin/products/{productId}/availability:
    get:
      tags:
        - Admin Products
      operationId: getAdminProductAvailability
      summary: Get admin product availability
      description: Target `/api/v1` contract. Runtime alpha also exposes `/api/products/{productId}/outlet-availability`.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product outlet availability rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductAvailabilityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Admin Products
      operationId: updateAdminProductAvailability
      summary: Update admin product availability
      description: Target `/api/v1` contract. Runtime alpha currently updates via `PUT /api/products/{productId}/outlet-availability`.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductAvailabilityRequest'
      responses:
        '200':
          description: Product availability updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductAvailabilityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/qr-codes:
    get:
      tags:
        - Admin QR
      operationId: listAdminQRCodes
      summary: List admin QR codes
      description: Target contract for QR management.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: QR code list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminQRCodeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Admin QR
      operationId: createAdminQRCode
      summary: Create admin QR code
      description: Target contract for QR management.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQRCodeRequest'
      responses:
        '201':
          description: QR code created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminQRCodeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/qr-codes/{qrCodeId}:
    get:
      tags:
        - Admin QR
      operationId: getAdminQRCode
      summary: Get admin QR code detail
      description: Target contract for QR management.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QrCodeId'
      responses:
        '200':
          description: QR code detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminQRCodeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/qr-codes/{qrCodeId}/activate:
    post:
      tags:
        - Admin QR
      operationId: activateAdminQRCode
      summary: Activate admin QR code
      description: Target contract for QR management.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QrCodeId'
      responses:
        '200':
          $ref: '#/components/responses/AdminQRCodeActionSuccess'
        '409':
          $ref: '#/components/responses/Conflict'
  /admin/qr-codes/{qrCodeId}/disable:
    post:
      tags:
        - Admin QR
      operationId: disableAdminQRCode
      summary: Disable admin QR code
      description: Target contract for QR management.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QrCodeId'
      responses:
        '200':
          $ref: '#/components/responses/AdminQRCodeActionSuccess'
        '409':
          $ref: '#/components/responses/Conflict'
  /admin/qr-codes/{qrCodeId}/revoke:
    post:
      tags:
        - Admin QR
      operationId: revokeAdminQRCode
      summary: Revoke admin QR code
      description: Target contract for QR management.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QrCodeId'
      responses:
        '200':
          $ref: '#/components/responses/AdminQRCodeActionSuccess'
        '409':
          $ref: '#/components/responses/Conflict'
  /admin/settings/payment-providers:
    get:
      tags:
        - Admin Settings
      operationId: listAdminPaymentProviders
      summary: List payment provider settings
      description: Target provider-agnostic contract for payment provider settings.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: mode
          in: query
          schema:
            $ref: '#/components/schemas/ProviderMode'
      responses:
        '200':
          description: Payment provider settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/settings/payment-providers/{providerCode}/activate:
    post:
      tags:
        - Admin Settings
      operationId: activateAdminPaymentProvider
      summary: Activate payment provider
      description: Target provider-agnostic contract. Requires settings payment manage permission and audit logging.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProviderCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivatePaymentProviderRequest'
      responses:
        '200':
          description: Provider activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderSettingResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/settings/payment-providers/{providerCode}/configure:
    post:
      tags:
        - Admin Settings
      operationId: configureAdminPaymentProvider
      summary: Configure payment provider
      description: Target provider-agnostic contract. Secret values must not be returned in response.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProviderCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigurePaymentProviderRequest'
      responses:
        '200':
          description: Provider configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentProviderSettingResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
  /webhooks/payments/{providerCode}:
    post:
      tags:
        - Webhooks
      operationId: receivePaymentWebhook
      summary: Receive payment provider webhook
      description: Receives payment provider webhook, verifies signature/token, stores event, and processes transition idempotently.
      security:
        - ProviderWebhookSignature: []
        - XenditCallbackToken: []
      parameters:
        - $ref: '#/components/parameters/ProviderCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook accepted or duplicate safely ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
              examples:
                accepted:
                  $ref: '#/components/examples/WebhookAcceptedResponse'
        '401':
          description: Invalid webhook signature or token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidSignature:
                  $ref: '#/components/examples/WebhookInvalidSignatureResponse'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  securitySchemes:
    QrSessionToken:
      type: apiKey
      in: header
      name: X-QR-Session-Token
    IdempotencyKey:
      type: apiKey
      in: header
      name: Idempotency-Key
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ProviderWebhookSignature:
      type: apiKey
      in: header
      name: X-Provider-Signature
    XenditCallbackToken:
      type: apiKey
      in: header
      name: x-callback-token
  parameters:
    StorefrontSlug:
      name: storefrontSlug
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      example: selkop
    QrToken:
      name: qrToken
      in: path
      required: true
      schema:
        type: string
        minLength: 16
      example: qr_opaque_token
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
      example: pay_019000000000
    PublicOrderToken:
      name: publicOrderToken
      in: path
      required: true
      schema:
        type: string
        minLength: 8
      example: po_019000000000
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
      example: ord_019000000000
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
      example: prod_019000000000
    QrCodeId:
      name: qrCodeId
      in: path
      required: true
      schema:
        type: string
      example: qr_code_019000000000
    ProviderCode:
      name: providerCode
      in: path
      required: true
      schema:
        type: string
        enum:
          - bayargg
          - xendit
          - doku
          - midtrans
          - manual
      example: bayargg
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  requestBodies:
    AdminOrderActionRequestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminOrderActionRequest'
  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation:
              value:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid request payload.
                  details: {}
                meta:
                  request_id: req_01HXABC123
    Unauthorized:
      description: Authentication required or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated actor does not have permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict or invalid state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    QRInvalid:
      description: QR token is expired, revoked, disabled, or incompatible with current ordering state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    IdempotencyConflict:
      description: Same idempotency key was reused with different payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PaymentProviderError:
      description: Payment provider failed or is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    OrderInvalidTransition:
      description: Order action is not allowed from current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AdminOrderActionSuccess:
      description: Admin order action applied idempotently.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminOrderDetailResponse'
    AdminQRCodeActionSuccess:
      description: QR code action applied.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminQRCodeResponse'
  schemas:
    SuccessResponse:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          additionalProperties: true
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
