risks:
- id: RISK-001
  title: Existing CRM regression
  severity: high
  mitigation: Preserve existing behavior and require regression tests before each checkpoint.
- id: RISK-002
  title: Cross-workspace or cross-outlet data leak
  severity: critical
  mitigation: Server-derived workspace context, outlet-access middleware, scoped repositories, and security tests.
- id: RISK-003
  title: Duplicate order or payment from repeated webhook/callback
  severity: critical
  mitigation: Idempotency keys, unique provider event keys, atomic transitions, and concurrent duplicate tests.
- id: RISK-004
  title: False paid payment
  severity: critical
  mitigation: Verified provider webhook, amount/currency validation, and no standard mark-paid endpoint.
- id: RISK-005
  title: Database migration inconsistency
  severity: high
  mitigation: Repository contracts, incremental cutover, backfill validation, backup, and rollback.
- id: RISK-006
  title: In-process jobs lost on restart
  severity: medium
  mitigation: Document limitation and migrate critical jobs to a durable queue before multi-instance production.
