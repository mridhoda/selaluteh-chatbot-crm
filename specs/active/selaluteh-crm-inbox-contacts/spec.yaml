    - WHATSAPP
    - TELEGRAM

  contact:
    stable-internal-id: true
    display-name-is-unique-identity: false
    multiple-channel-identities: true
    cross-workspace-auto-merge: false

  conversation:
    outlet-context-optional-before-selection: true
    lifecycle-and-handling-mode-separated: true
    one-primary-assignee: true

  handling_modes:
    - AI_ACTIVE
    - HANDOFF_PENDING
    - HUMAN_ACTIVE
    - HUMAN_PAUSED
    - AUTOMATION_DISABLED

  ai:
    workspace-default-agent-supported: true
    human-active-blocks-autonomous-reply: true
    business-scope-guard-required: true
    off-topic-no-rag-no-tools: true
    working-memory-retention-months: 3
    expired-memory-deletes-crm-records: false

  notes:
    internal-never-transported: true
    customer-visible: false

  boundaries:
    provider-transport: selaluteh-channel-connections-sync
    order-truth: selaluteh-cart-order-lifecycle
    payment-truth: selaluteh-payments-xendit
    complaint-truth: selaluteh-complaints-tickets

