description: >-
  Dedicated requirements-first specification for workspace-scoped contacts,
  multi-channel identities, conversations, durable messages, inbox queues,
  unread state, multi-outlet visibility, member and team assignment, AI and
  human handling modes, smart handoff, internal notes, contact and conversation
  timelines, AI summaries and three-month working-memory boundaries, linked
  order/payment/complaint context, import/export, audit, security, migration,
  testing, and production readiness.

