id: selaluteh-ai-security-guardrails
title: SelaluTeh AI Security Guardrails and Tool Execution Boundary
description: >-
  Security architecture and implementation specification for strict
  business-domain scope control, immutable tenant context, AI tool policy
  enforcement, explicit confirmation, canonical commerce services, payment
  authority, idempotency, observability, and adversarial evaluation across
  Telegram and WhatsApp.
type: security-architecture
domain:
  - ai-agent
  - security
  - guardrails
  - tool-execution
  - commerce
status: active
workflow_state: in_progress
implementation_status: in_progress
priority: critical
version: 1.0.0
created_at: 2026-07-03
updated_at: 2026-07-03
requirement_prefix: AISG
requirement_count: 90
workspace_model:
  alpha: multi-outlet-single-workspace
  production_ready_foundation: multi-workspace-multi-account
channels:
  - telegram
  - whatsapp
fulfillment:
  alpha: pickup-only
payment_authority:
  paid_status: verified-provider-webhook-or-reconciliation-only
source_documents:
  - Pasted markdown.md
  - docs/specs/active/selaluteh-ai-agent-architecture/
  - docs/specs/active/selaluteh-cart-order-lifecycle/
  - docs/specs/active/selaluteh-channel-connections-sync/
goals:
  - Prevent AI function calling from bypassing canonical domain services.
  - Enforce strict SelaluTeh business-domain scope before retrieval and tools.
  - Make all mutation authority deterministic, server-side, tenant-scoped, and
    auditable.
  - Require explicit customer confirmation for natural-language commerce
    mutations.
  - Preserve product, outlet, cart, checkout, order, payment, and pickup
    integrity.
  - Prevent duplicate effects under retries, concurrency, duplicate webhooks,
    and repeated taps.
  - Provide measurable security evaluations and safe rollout controls.
non_goals:
  - Implement delivery fulfillment in the alpha release.
  - Allow AI to mark payments paid, approve refunds, or override payment state.
  - Preserve FILE_ORDER_JSON as an ecommerce order path.
  - Replace canonical cart, checkout, order, payment, or complaint services with
    AI-specific logic.
  - Introduce autonomous cross-workspace reasoning or unrestricted
    general-purpose tools.
fastest_safe_alpha_slice:
  required_capabilities:
    - immutable-domain-scope-guard
    - immutable-ai-action-context
    - ai-tool-gateway
    - canonical-service-only-mutations
    - explicit-confirmation-token
    - outlet-scoped-product-search
    - active-outlet-validation
    - canonical-cart-add-item
    - stable-checkout-idempotency
    - atomic-checkout-to-order
    - verified-payment-authority
    - legacy-commerce-path-disabled
    - pickup-only-confirmation
    - cross-tenant-and-adversarial-tests
  deferred:
    - advanced-promotion-personalization
    - delivery-fulfillment
    - autonomous-multi-agent-delegation
    - adaptive-risk-scoring
    - fully-automated-incident-remediation
architecture_decisions:
  - id: AISG-AD1
    decision: LLM output is a proposal, never mutation authority.
  - id: AISG-AD2
    decision: Every AI tool call passes through one deterministic Tool Gateway.
  - id: AISG-AD3
    decision: AI tools never call repository mutations directly.
  - id: AISG-AD4
    decision: Tenant and business context is generated by the server and immutable
      per execution.
  - id: AISG-AD5
    decision: Natural-language mutations require a bound, expiring, single-use
      confirmation.
  - id: AISG-AD6
    decision: Ecommerce orders use only Product to Cart to Checkout to Order to Payment.
  - id: AISG-AD7
    decision: Outlet availability uses explicit allow and default deny for alpha.
  - id: AISG-AD8
    decision: PAID is controlled only by verified provider webhook or reconciliation.
  - id: AISG-AD9
    decision: Alpha fulfillment is pickup-only.
  - id: AISG-AD10
    decision: Unknown action, missing policy, or failed dependency is denied by default.
reading_order:
  - spec.yaml
  - requirements.md
  - design.md
  - tasks.md
