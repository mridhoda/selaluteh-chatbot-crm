fixed_decisions:
  fulfillment:
    active_type: PICKUP
    delivery_active: false
    stored_delivery_address_required: false

  cart:
    one_outlet_only: true
    alpha_active_cart_scope: customer-conversation-and-outlet
    customer_confirmation_required: true

  pricing:
    authority: BACKEND
    currency: IDR
    money_storage: integer-minor-units
    client_or_ai_price_authoritative: false

  outlet:
    selected_each_order: true
    suggestion_allowed: true
    silent_ai_finalization: false
    only_selected_outlet_can_approve: true

  payment:
    provider: XENDIT
    paid_authority: selaluteh-payments-xendit
    payment_paid_and_order_approved_separated: true
    unpaid_order_can_be_approved: false
    paid_next_status: AWAITING_OUTLET_APPROVAL

  inventory:
    reserve_at: PAYABLE_ORDER_OR_PAYMENT_LINK_CREATION
    preserve_after_payment_success: true
    commit_at: OUTLET_APPROVAL
    release_on:
      - PAYMENT_EXPIRED
      - ORDER_REJECTED
      - ORDER_CANCELLED
      - ORDER_EXPIRED

  channels:
    active_mvp:
      - WHATSAPP
      - TELEGRAM

  ai:
    can_manage_cart: true
    can_create_order_after_confirmation: true
    can_mark_paid: false
    can_approve_order: false
    can_mutate_stock: false
    off_topic_no_tools: true

  order_statuses:
    - PENDING_PAYMENT
    - PAYMENT_PROCESSING
    - AWAITING_OUTLET_APPROVAL
    - APPROVED
    - PREPARING
    - READY_FOR_PICKUP
    - COMPLETED
    - REJECTED
    - CANCELLED
    - EXPIRED

