metadata:
  generated_for: selaluteh-product-catalog
  generated_at: '2026-06-22'
  based_on:
    - selaluteh-backend-marketplace
    - selaluteh-workspace-access-control
    - selaluteh-outlet-management-operations
    - latest-product-page-ui-designs
    - latest-multi-outlet-decisions
    - specs-lifecycle-config

  notes:
    - This is a full-product spec with an explicit fastest safe alpha slice.
    - Product Catalog owns canonical definitions, pricing, outlet assignment,
      and catalog availability policy.
    - Inventory remains the authority for stock quantity and stock movements.
    - Orders must use immutable product snapshots.
    - AI and clients cannot provide authoritative prices.
