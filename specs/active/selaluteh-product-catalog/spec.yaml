fixed_decisions:
  owner: workspace
  operational_scope: outlet
  database: supabase-postgresql
  currency:
    alpha: IDR
    storage: integer-minor-units

  product_types:
    - STANDARD
    - VARIANT_PARENT
    - BUNDLE
    - ADD_ON_ONLY

  product_statuses:
    - DRAFT
    - ACTIVE
    - INACTIVE
    - ARCHIVED

  price_authority: backend-catalog-service
  client-price-trusted: false
  ai-price-trusted: false

  effective_price_precedence:
    - variant-outlet-override-future
    - product-outlet-override
    - variant-explicit-price
    - product-base-plus-variant-adjustment
    - modifier-adjustments

  availability_dimensions:
