schema_version: 2
spec_version: 1.0.0

id: selaluteh-product-catalog
title: SelaluTeh Product Catalog
description: >-
  Dedicated requirements-first specification for the workspace-owned canonical
  product catalog, categories, product lifecycle, base and outlet pricing,
  multi-outlet assignments, availability policies, variants, modifier groups,
  bundles, add-ons, media references, AI catalog tools, order snapshot
  integration, inventory boundaries, channel publishing contracts, audit,
  caching, migration, testing, and production readiness.

type: feature
workflow: requirements-first

status: active
workflow_state: in_progress
priority: critical

created_at: '2026-06-22'
updated_at: '2026-06-23'

owners:
  product_owner: SelaluTeh product owner
  technical_owner: project-maintainer
  implementation_actor: coding-agent
  review_required: true
  security_review_required: true

tags:
