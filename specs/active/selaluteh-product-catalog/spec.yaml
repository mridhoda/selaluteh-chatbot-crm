    - outlet-assignment
    - customer-visibility
    - orderable
    - outlet-operational-state
    - product-schedule
    - manual-temporary-unavailable
    - inventory-signal

  inventory:
    owned-by: selaluteh-inventory-stock-ledger
    catalog-stores-quantity: false
    default-failure-policy-for-controlled-items: fail-closed

  order:
    selection-must-be-revalidated: true
    immutable-snapshot-required: true
    historical-orders-depend-on-current-catalog: false

  ai:
    structured-tools-only: true
    can-invent-products: false
    can-invent-prices: false
    can-invent-options: false

  outlet_assignment:
    explicit: true
    unassigned-product-orderable: false

