correctness_invariants:
  - every-product-belongs-to-one-workspace
  - sku-is-unique-per-workspace
  - archived-or-inactive-product-is-not-newly-orderable
  - unassigned-product-is-not-orderable-at-outlet
  - effective-price-is-calculated-server-side
  - client-and-ai-price-is-ignored
  - effective-price-is-never-negative
  - effective-availability-is-deterministic-for-same-input
  - unknown-availability-fails-closed
  - invalid-variant-or-modifier-selection-is-rejected
  - order-snapshot-does-not-change-after-catalog-edit
  - catalog-does-not-own-stock-quantity
  - outlet-price-mutation-requires-outlet-scope
  - customer-catalog-never-exposes-internal-notes
  - cache-never-authorizes-stale-checkout-price
  - provider-sync-failure-does-not-corrupt-canonical-catalog

