fixed_decisions:
  ledger:
    append_only: true
    correction_strategy: compensating-entry
    direct_edit_delete_allowed: false
    authoritative_history: true

  balances:
    projected: true
    fields:
      - on_hand
      - reserved
      - available
      - in_transit
    equation: available-equals-on-hand-minus-active-reserved
    rebuildable: true

  ownership:
    item_definition_scope: workspace
    quantity_scope: outlet
    cross_workspace_inventory: false

  tracking_modes:
    - NONE
    - DIRECT
    - RECIPE

  negative_stock:
    default_allowed: false
    override_requires_permission: true
    ai_can_override: false

  alpha_order_policy:
    reserve_at: PAYABLE_ORDER_OR_PAYMENT_LINK_CREATION
    preserve_after_payment_success: true
    commit_at: OUTLET_APPROVAL
    release_on:
      - PAYMENT_EXPIRED
      - ORDER_REJECTED
      - ORDER_CANCELLED
      - RESERVATION_EXPIRED

  ai:
    read_only_tools: true
    mutation_tools_allowed: false

requirements_registry:
