fixed_decisions:
  provider: XENDIT
  active_provider_count: 1
  midtrans_active: false
  cash_on_delivery: false
  manual_bank_transfer_confirmation: false

  country: ID
  currency: IDR
  internal_money_storage: integer-minor-units

  alpha_environment: TEST
  live_environment_requires_gate: true

  primary_integration:
    adapter: XENDIT_PAYMENT_SESSION
    endpoint: POST /sessions
    session_type: PAY
    mode: PAYMENT_LINK
    capture_method: AUTOMATIC
    allow_save_payment_method: DISABLED
    hosted_checkout: true

  compatibility_integration:
    adapter: XENDIT_LEGACY_INVOICE
    endpoint: POST /v2/invoices
    preferred: false
    allowed_only_if_required: true
    simultaneous_active_with_primary: false

  provider_docs:
    verified_at: '2026-06-22'
    official_sources:
      - Xendit Payment Sessions Overview
      - Xendit Create a Session API
      - Xendit Get Session API
      - Xendit Payment Webhook Notification
      - Xendit Handling Webhooks
      - Xendit Payment Link Migration Guidance
      - Xendit Refund Payment Request

  credential_scope: workspace
  outlet_owns_provider_secret: false

  payment_truth:
    authority:
      - verified-xendit-webhook
      - verified-server-side-reconciliation
    frontend_return_url_authoritative: false
    ai_authoritative: false
    outlet_authoritative: false
    admin_manual_mark_paid: false

  order:
    amount_authority: order-payable-snapshot
    payment_paid_status_separate_from_order_approved: true
    paid_next_order_state: AWAITING_OUTLET_APPROVAL

  webhook:
    server_side_only: true
    primary_verification: x-callback-token
    durable_intake: true
    idempotent: true
    out_of_order_safe: true

  payment_statuses:
    - CREATED
    - PENDING
    - PROCESSING
    - PAID
    - FAILED
    - EXPIRED
    - CANCELLED
    - REVIEW_REQUIRED
    - REFUND_PENDING
    - PARTIALLY_REFUNDED
    - REFUNDED
    - DISPUTED

  refund:
    return_to_original_method: true
    full_supported_when_provider_channel_supports: true
    partial_supported_when_provider_channel_supports: true
    ai_can_execute: false

