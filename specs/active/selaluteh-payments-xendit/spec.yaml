schema_version: 2
spec_version: 1.0.0

id: selaluteh-payments-xendit
title: SelaluTeh Payments — Xendit
description: >-
  Dedicated requirements-first specification for secure Xendit payment
  collection using Payment Session hosted payment links, workspace and outlet
  scoping, payment aggregates, sessions and attempts, webhook verification,
  idempotent status processing, order transition, WhatsApp and Telegram link
  delivery, expiry and regeneration, reconciliation, refunds, operations UI,
  audit, observability, migration, testing, and production readiness.

type: feature
workflow: requirements-first

status: active
workflow_state: in_progress
priority: critical
created_at: '2026-06-22'
updated_at: '2026-06-23'

