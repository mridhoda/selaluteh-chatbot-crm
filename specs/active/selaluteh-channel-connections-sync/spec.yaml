schema_version: 2
spec_version: 1.0.0

id: selaluteh-channel-connections-sync
title: SelaluTeh Channel Connections & Sync
description: >-
  Dedicated requirements-first specification for workspace-level WhatsApp,
  Telegram, and future provider connections; secure credentials; verified
  webhooks; normalized inbound and outbound messaging; CRM integration;
  multi-outlet channel assignment; chat and order acceptance; outlet routing;
  workspace-default and optional override AI handling; human handoff; payment
  and order notifications; provider health; diagnostics; catalog and external
  order sync contracts; audit; observability; migration; testing; and production
  readiness.

