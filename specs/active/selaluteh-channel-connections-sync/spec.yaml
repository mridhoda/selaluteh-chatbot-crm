fixed_decisions:
  active_mvp_channels:
    - WHATSAPP
    - TELEGRAM

  planned_channels:
    - INSTAGRAM
    - FACEBOOK_MESSENGER
    - WEBSITE_CHAT
    - WEBSITE_ORDERING
    - TOKOPEDIA
    - SHOPEE

  credential_scope: WORKSPACE
  outlet_owns_provider_credentials: false
  one_connection_can_serve_many_outlets: true

  outlet_assignment:
    explicit: true
    statuses:
      - ENABLED
      - DISABLED
      - PENDING_CONFIGURATION
    accepts_chats_and_orders_are_separate: true

  routing:
    alpha_default: CUSTOMER_SELECTS_OUTLET
    ai_can_finalize_without-customer-confirmation: false

  ai:
    workspace_default_agent_supported: true
    outlet_override_optional: true
    channel_override_optional: true
    resolution_order:
      - channel-override
      - outlet-override
      - workspace-default
    can_manage-provider-credentials: false

  status_dimensions:
    connection:
      - DRAFT
      - PENDING_SETUP
      - CONNECTED
      - DEGRADED
      - DISCONNECTED
      - REAUTH_REQUIRED
      - SUSPENDED
      - ARCHIVED
    health:
      - UNKNOWN
      - HEALTHY
      - DEGRADED
      - UNHEALTHY
      - OFFLINE
    sync:
      - NOT_APPLICABLE
      - IDLE
      - PENDING
      - RUNNING
      - SUCCEEDED
      - FAILED
      - OUT_OF_SYNC

  webhook:
    verify_before-mutation: true
    durable-intake: true
    idempotent: true
    replay-protected: true

  messages:
    inbound-durable-before-ai: true
    outbound-idempotent: true
    provider-event-order-not-assumed: true

  sync:
    canonical-products: selaluteh-product-catalog
    canonical-orders: selaluteh-cart-order-lifecycle
    whatsapp-telegram-chat-orders-use-external-order-sync: false

