fixed_decisions:
  platforms:
    supported: [DESKTOP_LINUX, DESKTOP_WINDOWS, ANDROID]
  transports:
    desktop_alpha: BROWSER_PRINT
    android_alpha: CLEANTER
    development: MOCK
    desktop_advanced: [QZ_TRAY, LOCAL_AGENT]
    experimental: []
  document:
    default_final_proof: CUSTOMER_RECEIPT
    default_final_trigger: ORDER_COMPLETED
    manual_after_verified_paid_allowed: true
    paid_receipt_requires_verified_payment: true
    test_mode_marker_required: true
  renderer:
    canonical_snapshot_required: true
    html_supported: true
    escpos_supported: true
    paper_widths_mm: [58, 80]
  result_semantics:
    dispatch_is_physical_completion: false
    browser_print_invocation_completes_job: false
    cleanter_transport_ack_completes_job: false
    completion_evidence_required: true
  auto_print:
    alpha_enabled: false
    lease_required_when_enabled: true

