metadata:
  generated_for: thermal-print-specs
  generated_at: '2026-06-24'
  notes:
    - Browser Print is the alpha desktop path.
    - Cleanter is the alpha Android path via POST http://localhost:9100/print.
    - RawBT is legacy-disabled and removed from active Android UI/source transport registration.
    - Web Bluetooth remains experimental.
    - Dispatch and physical completion are separate.
    - Printing failure never blocks order completion.
