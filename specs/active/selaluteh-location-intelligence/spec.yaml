fixed_product_decisions:
  spec_id: selaluteh-location-intelligence
  requirement_prefix: LINT-R

  customer_input_default: text-first
  share_location_required: false
  share_location_optional: true

  minimum_location_context:
    city_required: true
    require_one_of:
      - street
      - area
      - landmark
      - place_name
      - postal_code

  city_guessing_allowed: false
  active_flow_city_reuse_allowed: true
  durable-memory-city-reuse_allowed: false

  pending_location_ttl_minutes: 30

  mvp_search_scope: supported-outlet-cities-only
  future_search_scope: indonesia-wide

  provider_architecture: adapter-based
  active_provider: google
  unrestricted-internet-access: false

  outlet_location_input: google-maps-url
  outlet_location_persistence: preview-then-confirm
  manual-pin-adjustment: allowed-and-audited
  significant-refresh-change: needs-review

  nearest-calculation-default: geographic-distance
  geographic-calculation:
    preferred: postgis-when-available
    fallback: haversine

  route-calculation-default: disabled
  directions-trigger: explicit-customer-request-only
  directions-default-mode-when-unspecified: DRIVE

  default-result-count:
    recommended: 1
    alternatives_max: 2

  default-service-radius-km: 25
  service-radius-configurable: true

  open-outlet-preference: true
  closed-outlet-may-appear-as-alternative: true
  all-closed-behavior: show-nearest-with-status-and-authoritative-next-opening

  outlet-confirmation-required: true
  selected-outlet-mutation-owned-by: selaluteh-backend-marketplace

  customer-location-durable-memory: forbidden
  customer-coordinate-standard-logging: forbidden
  background-location-tracking: forbidden

  google-maps-place-link-in-default-result: true
  google-api-key-client-exposure: forbidden

  url-resolver:
    generic-fetch-tool: forbidden
    ssrf-protection: required
    redirect-limit: 5
    html-scraping: forbidden

customer_location_flow:
  statuses:
    - EMPTY
    - MISSING_CITY
    - MISSING_DETAIL
    - READY_TO_RESOLVE
    - RESOLVING
    - AMBIGUOUS
    - READY_TO_CALCULATE
    - RESULTS_READY
    - CONFIRMING_OUTLET
    - CONFIRMED
    - CANCELLED
    - EXPIRED

  input_types:
    - text
    - structured_fields
    - shared_coordinates
    - google_maps_url
    - candidate_selection

  completeness_rules:
    street_without_city: MISSING_CITY
    area_without_city: MISSING_CITY
    landmark_without_city: MISSING_CITY
    place_without_city: MISSING_CITY
    city_only: MISSING_DETAIL
    city_plus_detail: READY_TO_RESOLVE
    shared_coordinates: READY_TO_CALCULATE

  clarification_codes:
    - ASK_CITY
    - ASK_STREET_AREA_OR_LANDMARK
    - ASK_CANDIDATE_SELECTION
    - ASK_LOCATION_CORRECTION

  expiry:
    inactivity_minutes: 30
    clear_on:
      - outlet-confirmed
      - customer-cancelled
      - session-invalidated
      - ttl-expired

  persistence:
    durable_customer_memory: false
    database_backed_temporary_state_preferred: true
    redis_only_authority: false
    idempotent_by_message_id: true
    workspace_scoped: true
    contact_chat_scoped: true

supported_city_policy:
  country_code: ID
  derivation:
    requires_at_least_one_outlet:
      - active
      - pickup-enabled
      - not-deleted
      - location-verified
      - workspace-matched

  provider_bias:
    country: Indonesia
    city: customer-confirmed-supported-city

  unsupported_city_behavior:
    resolve_nationwide_by_default: false
    show_supported_cities: true
    show_distant_outlet_as_nearby: false

  aliases:
    controlled_registry: true
    model_generated_aliases_allowed: false

provider:
  interface_name: LocationProvider

  methods:
    - geocodeText
    - searchPlaces
    - getPlaceDetails
    - resolveMapsUrl
    - getDirections
    - health

  active:
    id: google
    type: google-maps-platform

  configuration:
    provider_env: LOCATION_PROVIDER
    api_key_env: GOOGLE_MAPS_API_KEY
    timeout_env: LOCATION_PROVIDER_TIMEOUT_MS
    retry_env: LOCATION_PROVIDER_RETRY_MAX

  default_limits:
    timeout_ms: 3000
    retry_max: 1

  required_properties:
    - backend-only-credentials
    - strict-output-normalization
    - bounded-timeout
    - bounded-retry
    - cancellation
    - minimum-field-request
    - no-raw-response-persistence
    - stable-domain-errors
    - provider-version-trace

  fake_provider_required: true
  live-google-tests-in-default-ci: false

location_resolution:
  normalization:
    expand_abbreviations:
      Jl.: Jalan
      Kec.: Kecamatan
      Kel.: Kelurahan
    append_country: Indonesia
    preserve_meaningful-place-names: true
    reject-unrelated-instructions: true

  strategy:
    street: geocode
    postal_code: geocode
    structured_address: geocode
    landmark: places-text-search
    place_name: places-text-search
    building: places-text-search

  result_statuses:
    - RESOLVED
    - AMBIGUOUS
    - NOT_FOUND
    - OUTSIDE_SUPPORTED_CITY
    - INVALID_INPUT
    - PROVIDER_UNAVAILABLE
    - RATE_LIMITED

  confidence:
    categories:
      - high
      - medium
      - low
    high_single_candidate_may_proceed: true
    medium_requires_clarification: true
    low_requires_clarification: true
    multiple_candidates_require_clarification: true
    maximum_candidates_shown: 3

  city_consistency:
    requested_city_must_match_candidate: true
    mismatch_behavior: reject-or-ambiguous
    silent_city_substitution: forbidden

customer_input_priority:
  - shared_coordinates
  - resolved_google_maps_url
  - street_or_area_plus_city
  - landmark_or_place_plus_city
  - postal_code_plus_city

admin_outlet_location:
  flow:
    - resolve
    - preview
    - optional-manual-adjustment
    - confirm
    - persist
    - audit
    - invalidate-caches

  preview_ttl_minutes: 15
  persist_before_confirmation: false

  location_sources:
    - provider_resolved
    - manual_adjustment
    - imported
    - migrated

  statuses:
    - UNRESOLVED
    - RESOLVED
    - VERIFIED
    - NEEDS_REVIEW
    - INVALID

  verification:
    scheduled_interval_months: 12
    minor_coordinate_change_threshold_meters: 50
    significant_change_behavior: NEEDS_REVIEW
    silent_significant-overwrite: false
    manual-refresh-supported: true
    dry-run-supported: true

canonical_outlet_location:
  persistent: true
  required_for-eligibility: true

  minimum_fields:
    - workspace_id
    - outlet_id
    - provider
    - provider_place_id
    - source_url
    - google_maps_uri
    - formatted_address
    - city
    - province
    - country_code
    - postal_code
    - latitude
    - longitude
    - location_source
    - status
    - confidence
    - resolver_version
    - location_version
    - resolved_at
    - verified_at
    - last_verification_at
    - next_verification_at
    - created_at
    - updated_at

  coordinate_constraints:
    latitude_min: -90
    latitude_max: 90
    longitude_min: -180
    longitude_max: 180

  eligible_statuses:
    - VERIFIED

  runtime_behavior:
    resolve-google-url-per-customer-request: false
    use-stored-coordinates: true

outlet_eligibility:
  required:
    - workspace-match
    - not-deleted
    - active
    - pickup-enabled
    - not-operationally-disabled
    - verified-location
    - valid-coordinates

  source_of_truth: selaluteh-backend-marketplace
  llm_override_allowed: false
  revalidate_at:
    - nearest-search
    - customer-confirmation

nearest_outlet:
  origin:
    - resolved-temporary-customer-coordinates
    - shared-temporary-customer-coordinates

  destination:
    - canonical-verified-eligible-outlet-coordinates

  calculation:
    default: geographic-distance
    preferred: postgis
    fallback: haversine
    server_side_only: true
    llm_calculation: forbidden
    distance_unit_internal: meters

  ranking:
    recommended_count: 1
    alternatives_max: 2
    stable_tie_breaker: outlet-id-or-name
    route-api-default: false

  correctness:
    non_negative_distance: true
    stable_sorting: true
    workspace_isolation: true
    unverified_outlets_allowed: false
    travel_duration_from-haversine: forbidden

opening_preference:
  source_of_truth: selaluteh-backend-marketplace
  google-opening-hours-authoritative: false

  statuses:
    - open
    - closed
    - unknown

  default_policy:
    prefer-open-outlet: true
    open-distance-tolerance-km: 3
    disclose-farther-open-recommendation: true
    closed-nearest-may-appear-as-alternative: true
    all-closed-show-nearest: true
    next-opening-requires-authoritative-data: true

service_radius:
  platform_default_km: 25
  configurable: true

  precedence:
    - outlet-group
    - city
    - workspace
    - platform-default

  outside_radius:
    label_as_nearby: false
    may_show-nearest-informationally: true
    default-confirmation-offered: false
    explicit-policy-required-for-selection: true

maps_links:
  default_result:
    include-place-link: true
    include-directions-link: false
    include-travel-duration: false

  place_link:
    preferred_source: canonical-google-maps-uri
    fallback: generated-google-maps-url
    api_key_in-url: false

  directions_link:
    generated-server-side: true
    api_key_in-url: false
    arbitrary-user-host: false

directions:
  enabled: true
  default_invocation: false
  explicit-request-required: true

  supported_modes:
    - DRIVE
    - WALK

  default_mode_when_unspecified: DRIVE

  result:
    - estimated_distance_meters
    - estimated_duration_seconds
    - google_maps_directions_url
    - estimate_available

  failure:
    return-directions-link-without-estimate: true
    fabricate-duration: false

  cache_ttl_minutes: 10

customer_confirmation:
  required: true

  before:
    - selected_outlet_id-persisted
    - new-cart-created
    - product-added-to-new-cart
    - checkout-started
    - order-created

  validation:
    - active-flow
    - active-confirmation
    - outlet-in-current-result
    - workspace-match
    - outlet-still-eligible
    - location-still-verified
    - expected-outlet-version
    - marketplace-cart-rules

  accepted_inputs:
    - explicit-yes
    - use-recommended
    - choose-alternative
    - search-another-location
    - cancel

  ambiguous_yes_without-active-prompt: no-selection

  mutation_owner: selaluteh-backend-marketplace

  after_success:
    - clear-temporary-coordinates
    - clear-candidates
    - clear-pending-location-fields
    - clear-confirmation-state
    - retain-selected-outlet-through-marketplace

url_security:
  generic_fetch_tool: forbidden
  accepted_scheme:
    - https

  approved_hosts_configured: true
  initial_hosts:
    - google.com
    - www.google.com
    - maps.google.com
    - maps.app.goo.gl
    - goo.gl

  redirect_limit: 5
  validate_each_redirect: true
  final_host_revalidation: true
  response_size_limit_required: true
  short_timeout_required: true
  cookies_forwarded: false
  authorization_headers_forwarded: false
  javascript_execution: false
  html_scraping: false

  blocked_networks:
    - loopback
    - private-ipv4
    - link-local
    - ipv6-loopback
    - ipv6-private
    - ipv6-link-local
    - cloud-metadata

  blocked_schemes:
    - http-unless-explicitly-reviewed
    - file
    - ftp
    - data
    - javascript

  dns_rebinding_mitigation: required
  punycode-normalization: required
  secret-query-stripping-before-persistence: required

cache:
  required: true

  namespaces:
    - location:resolved-text
    - location:ambiguous
    - location:not-found
    - location:supported-cities
    - location:opening-status
    - location:directions
    - location:url-resolution

  default_ttl:
    resolved_text_days: 7
    ambiguous_hours: 1
    not_found_minutes: 10
    directions_minutes: 10
    url_resolution_days: 7

  key_components:
    - provider
    - provider-version
    - country
    - normalized-query-hash
    - city-bias
    - workspace-context-when-required

  prohibited_key_material:
    - raw-sensitive-address
    - raw-exact-customer-coordinates
    - provider-api-key

  invalidation_events:
    - outlet-location-changed
    - outlet-eligibility-changed
    - supported-city-changed
    - service-radius-changed
