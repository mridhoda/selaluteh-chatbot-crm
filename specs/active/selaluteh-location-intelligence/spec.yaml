# SelaluTeh Location Intelligence and Nearest Outlet Specification
#
# Spec ini khusus untuk:
# - text-first customer location
# - Google Maps provider integration
# - admin Google Maps URL resolver
# - canonical outlet coordinates
# - nearest outlet calculation
# - service radius
# - Google Maps link
# - optional directions
# - privacy, cache, rate limit, SSRF, dan observability
#
# Spec ini TIDAK menggantikan atau menggabungkan:
# - selaluteh-ai-agent-architecture
# - selaluteh-ai-agent-scope-security
# - selaluteh-backend-marketplace
#
schema_version: 2
spec_version: 1.0.0

id: selaluteh-location-intelligence
title: SelaluTeh Location Intelligence and Nearest Outlet
description: >-
  Requirements-first specification khusus untuk memahami lokasi customer secara
  text-first, mengumpulkan city dan detail lokasi secara progresif, me-resolve
  lokasi melalui provider adapter, menyimpan canonical outlet coordinates
  setelah admin confirmation, menghitung outlet eligible terdekat, memberikan
  Google Maps link, menyediakan optional directions hanya ketika diminta,
  menjaga customer location tetap sementara, serta menerapkan cache, rate
  limiting, SSRF protection, workspace isolation, observability, dan pengujian
  TDD.

type: feature
workflow: requirements-first

status: active
workflow_state: in_progress
priority: critical

created_at: '2026-06-20'
updated_at: '2026-06-20'

