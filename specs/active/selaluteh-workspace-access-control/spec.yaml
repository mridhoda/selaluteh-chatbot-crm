fixed_decisions:
  tenant_boundary: workspace_id
  operational_subscope: outlet_id
  database: supabase-postgresql
  authentication: custom-backend-auth-for-mvp
  authorization: centralized-backend-policy-engine
  default_policy: deny
  rls_role: defense-in-depth
  frontend_is_security_boundary: false

  membership_statuses:
    - INVITED
    - ACTIVE
    - SUSPENDED
    - REMOVED
    - EXPIRED

  workspace_statuses:
    - ACTIVE
    - SUSPENDED
    - ARCHIVED

  system_roles:
    - OWNER
    - ADMIN
    - OUTLET_MANAGER
    - OUTLET_STAFF
    - CUSTOMER_SUPPORT
    - FINANCE_VIEWER
    - ANALYST

  outlet_scope_modes:
    - ALL_OUTLETS
    - SELECTED_OUTLETS
    - NO_OUTLET_ACCESS

  owner_model:
    canonical_owner_count: 1
    generic_role-update-can-change-owner: false
    owner-can-be-removed-before-transfer: false
    owner-outlet-scope: ALL_OUTLETS

  custom_roles:
    enabled: true
    workspace-scoped: true
    cannot-grant-platform-reserved-permissions: true
    cannot-exceed-actor-delegable-permissions: true

  role_combination:
    alpha: single-primary-role
    full-product: multiple-role-ready
    grant-combination: union
    platform-deny-overrides: true

  invitation:
    token-storage: hash-only
    single-use: true
    identity-match-required: true
    rate-limited: true

  cache:
    authoritative: false
    bounded-ttl: true
    immediate-invalidation-for-suspension-removal: true

  ai:
    can-manage-memberships: false
    can-manage-roles: false
    can-transfer-ownership: false
    can-expand-permissions-through-prompt: false

  service_identity:
    explicit: true
    least-privilege: true
    arbitrary-user-session-inheritance: false

