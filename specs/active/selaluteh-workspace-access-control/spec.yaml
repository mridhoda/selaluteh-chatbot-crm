metadata:
  generated_for: selaluteh-workspace-access-control
  generated_at: '2026-06-22'
  based_on:
    - selaluteh-backend-marketplace
    - selaluteh-outlet-management-operations
    - latest-multi-workspace-multi-outlet-decisions
    - specs-lifecycle-config

  notes:
    - Authentication remains external and custom backend auth is retained for
      MVP.
    - Workspace is the tenant boundary and outlet is the operational sub-scope.
    - Owner protection, workspace isolation, and outlet isolation are
      release-critical.
    - Supabase RLS is defense-in-depth and does not replace backend
      authorization.
    - This is a full-product spec with an explicit fastest safe alpha slice.
