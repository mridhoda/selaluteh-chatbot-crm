runtime:
  language: javascript
  platform: nodejs
  framework: express
  architecture_style: modular-monolith

  ai_runtime:
    orchestration: custom-bounded-orchestrator
    tool_calling: native-structured-function-calling
    primary_provider: local-openai-compatible
    provider_adapter_required: true
    model_router_required: true
    max_tool_calls_default: 8
    max_iterations_default: 10
    turn_timeout_ms_default: 15000

  persistence:
    engine: postgresql
    platform: supabase
    vector_search: pgvector
    repository_boundary_required: true

  optional_supporting_frameworks:
    langchain:
      status: optional
      allowed_uses:
        - document-loaders
        - text-splitters
        - retrieval-composition
        - prompt-helpers
        - structured-output-helpers
        - evaluation
      forbidden_uses:
        - sole-authoritative-memory
        - cart-source-of-truth
        - order-source-of-truth
        - payment-source-of-truth
        - authorization-boundary

    langgraph:
      status: deferred
      adoption_requires_approved_design_change: true

    redis:
      status: optional
      allowed_uses:
        - cache
        - distributed-lock
        - rate-limit
        - queue
        - circuit-breaker
        - short-lived-typing-state
      forbidden_uses:
        - sole-message-store
        - sole-customer-memory-store
        - cart-source-of-truth
        - order-source-of-truth
        - payment-source-of-truth
        - knowledge-source-of-truth

    n8n:
      status: optional-non-critical-only
      allowed_uses:
        - internal-reporting
        - admin-notification
        - non-critical-automation
        - prototype-workflows
      forbidden_uses:
        - payment-authority
        - cart-authority
        - order-authority
        - permission-authority
        - webhook-verification-authority
        - core-conversation-state

