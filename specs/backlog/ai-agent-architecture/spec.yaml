# SelaluTeh AI Agent Architecture Specification
#
# Spec ini khusus untuk AI Agent Architecture.
# Spec ini tidak menggantikan atau menggabungkan spec backend marketplace.
# Domain commerce tetap dimiliki oleh backend domain services dan hanya
# diakses oleh AI melalui Tool Gateway serta kontrak yang terotorisasi.
#
schema_version: 2
spec_version: 1.0.0

id: selaluteh-ai-agent-architecture
title: SelaluTeh AI Agent Architecture
description: >-
  Requirements-first specification khusus untuk membangun arsitektur AI Agent
  SelaluTeh / KALIS.AI yang memiliki conversation context, persistent memory,
  rolling summary, RAG, configurable agents, local-first model routing,
  structured tool calling, Tool Gateway, human takeover, AI observability,
  evaluation, dan integration boundary yang aman terhadap product, cart,
  order, complaint, notification, serta Xendit payment. Spec ini tidak
  mendesain ulang domain backend marketplace dan tidak memberikan AI
  kewenangan transaction authority.

type: feature
workflow: requirements-first

status: active
workflow_state: in_progress
priority: high

created_at: '2026-06-19'
updated_at: '2026-06-19'

