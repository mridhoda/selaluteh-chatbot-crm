mvp_context:
  primary_language: id
  default_tone:
    - friendly
    - warm
    - semi-formal
    - gen-z
    - concise

  conversation_model:
    permanent_chat_per_channel: true
    session_inactivity_threshold_hours: 24
    recent_message_default_min: 20
    recent_message_default_max: 30
    rolling_summary_enabled: true
    raw_message_retention_days: 90

  customer_memory:
    allowed:
      - display-name
      - preferred-language
      - last-outlet
      - favorite-outlet
      - favorite-products
      - taste-preferences
      - communication-preferences
      - customer-tags
      - order-derived-preferences
    forbidden:
      - address
      - otp
      - password
      - card-data
      - payment-credential
      - provider-secret
      - api-key
      - unnecessary-sensitive-data

  commerce_assistance:
    outlet_confirmation_required: true
    last_outlet_is_suggestion_only: true
    max_active_cart_per_customer_per_workspace: 1
    cart_is_single_outlet: true
    final_order_confirmation_required: true
    fulfillment_mode: pickup
    delivery_enabled: false

  payment_assistance:
    provider: xendit
    customer_payment_methods:
      - xendit-payment-link
    ai_can_create_payment_link: true
    ai_can_resend_payment_link: true
    ai_can_read_payment_status: true
    ai_can_set_payment_status: false
    ai_can_mark_paid: false
    paid_authority: verified-backend-xendit-processing

  human_takeover:
    ai_customer_reply_disabled_when_active: true
    manual_resume_supported: true
    automatic_resume_enabled: true
    automatic_resume_after_customer_inactivity_minutes: 5
    pinned_takeover_supported: true

  agent_topology:
    current: lightweight-router-plus-one-selected-configurable-agent
    future: router-plus-specialist-agents

  persistence:
    engine: postgresql
    platform: supabase
    vector_extension: pgvector

  development_method:
    name: test-driven-development
    cycle:
      - red
      - green
      - refactor
      - verify

