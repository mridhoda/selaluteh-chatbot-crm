memory_policy:
  layers:
    - recent-messages
    - rolling-summary
    - durable-customer-memory
    - structured-commerce-state

  recent_messages:
    default_min: 20
    default_max: 30
    chronological_order: ascending
    persistent_source_required: true

  summary:
    enabled: true
    default_new_message_threshold: 12
    generated_on:
      - message-threshold
      - context-token-threshold
      - session-close
      - human-takeover

  durable_memory:
    model_may_propose_candidate: true
    model_may_write_directly: false
    policy_validation_required: true
    source_and_confidence_required: true
    correction_supported: true
    forgetting_supported: true

  retention:
    raw_messages_days: 90
    summaries_days_after_last_activity: 90
    ai_prompt_and_result_trace_days: 30
    ai_tool_trace_days: 90
    durable_preferences: until-deleted-expired-or-superseded
    commerce_records: controlled-by-backend-domain-retention

rag_policy:
  vector_store: supabase-pgvector
  retrieval_mode: hybrid-vector-and-full-text
  human_publish_required: true
  ai_auto_publish_allowed: false

  knowledge_sources:
    - faq
