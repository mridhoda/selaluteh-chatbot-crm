fixed_decisions:
  complaint:
    canonical_record: true
    duplicate_ticket_created: false
    status_separate_from_escalation: true

  policy:
    hierarchy:
      - WORKSPACE_DEFAULT
      - OUTLET_OVERRIDE
    override_modes:
      - USE_WORKSPACE_DEFAULT
      - CUSTOM
      - DISABLED

  outlet_resolution:
    priority:
      - RELATED_ORDER_OUTLET
      - EXPLICIT_COMPLAINT_OUTLET
      - CONVERSATION_SELECTED_OUTLET
    text_inference_allowed: false

  recipient:
    default_strategy: PRIMARY_ONLY
    fallback:
      - OTHER_OUTLET_SUPERVISOR
      - OUTLET_MANAGER
      - WORKSPACE_SUPPORT_MANAGER
      - ATTENTION_ALERT
    hard_coded_supervisor_allowed: false

  mvp_triggers:
    immediate_priorities:
      - HIGH
      - CRITICAL
    unassigned_after_minutes:
      medium_low: 10

  after_escalation:
    complaint_status_mode: SET_IN_PROGRESS
    primary_handler: KEEP_CS
    supervisor_assignment: OUTLET_SUPERVISOR_COLLABORATOR
    automatic_customer_notification: false
    internal_notes_included: false

  supervisor_sla:
    acknowledgement_minutes: 15
    first_response_minutes: 60

  escalation_statuses:
    - PENDING
    - ACKNOWLEDGED
    - RESPONDED
    - COMPLETED
    - CANCELLED
    - FAILED_ROUTING
    - EXPIRED

requirements_registry:
  prefix: AEC-R
  total: 60

correctness_invariants:
  - complaint-is-never-duplicated
  - complaint-and-escalation-status-are-separate
  - related-order-outlet-is-preferred
  - outlet-is-never-inferred-from-free-text
  - supervisor-is-resolved-from-active-membership
  - unrelated-outlet-supervisor-is-never-selected
  - one-active-escalation-per-complaint-outlet-level
  - auto-and-manual-race-has-one-business-effect
  - cs-remains-primary-handler-by-default
  - supervisor-response-is-internal-by-default
  - escalation-completion-does-not-auto-resolve-complaint
  - customer-sla-and-supervisor-sla-are-separate
  - duplicate-events-and-scheduler-retries-have-one-effect
  - cross-workspace-or-outlet-access-never-succeeds
  - routing-failure-preserves-complaint-truth

