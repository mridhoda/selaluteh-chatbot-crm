cost_guard:
  principle: use-lowest-sufficient-processing-tier

  tiers:
    TIER_0_DETERMINISTIC:
      llm_calls: 0
      rag_calls: 0
      embedding_calls: 0
      tool_schema_loads: 0
      tool_calls: 0
      use_cases:
        - known-callback
        - known-command
        - obvious-greeting
        - obvious-unsafe
        - cooldown
        - fixed-refusal

    TIER_1_CLASSIFIER:
      classifier_calls_max: 2
      rag_calls: 0
      embedding_calls: 0
      tool_schema_loads: 0
      tool_calls: 0
      full_agent_calls: 0
      use_cases:
        - uncertain-scope
        - ambiguous-natural-language

    TIER_2_CONSTRAINED_ADJACENT:
      rag: limited
      embedding: limited
      tools: read-only-official-data-only
      mutation_tools: false
      output_budget: reduced

    TIER_3_FULL_BUSINESS:
      rag: intent-dependent
      embedding: intent-dependent
      tools: tool-gateway-controlled
      full_agent: true
      bounded_orchestration: required

  denied_cost_invariant:
    full_agent_calls: 0
    rag_calls: 0
    embedding_calls: 0
    tool_schema_loads: 0
    tool_calls: 0
    memory_extraction_calls: 0

