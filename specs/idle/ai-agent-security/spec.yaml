policy_profiles:
  registry_owner: platform
  published_versions_immutable: true
  arbitrary_tenant_profiles_allowed: false

  profiles:
    customer_commerce_strict:
      version: 1
      customer_facing: true
      internal_only: false
      small_talk_max: 1
      adjacent_turn_max: 2
      clarification_attempts: 1
      off_topic_first_action: friendly-fixed-refusal
      off_topic_second_action: short-fixed-refusal
      off_topic_third_action: cooldown
      cooldown_seconds: 60
      max_cooldown_seconds: 300
      denied_rag: false
      denied_embedding: false
      denied_tools: false
      denied_full_agent: false

    product_advisor:
      version: 1
      customer_facing: true
      internal_only: false
      allows:
        - product
        - recommendation
        - product-ingredients
        - allergens
        - caffeine
        - dietary-information
        - taste-comparison
        - product-availability-read
      mutation_tools_default: false

    customer_support:
      version: 1
      customer_facing: true
      internal_only: false
      allows:
        - order-status
        - payment-status-read
        - pickup
        - complaint
        - ticket
        - refund-policy
        - handoff

    internal_business_copilot:
      version: 1
      customer_facing: false
      internal_only: true
      allows:
        - business-reports
        - campaign-drafts
        - brand-content
        - complaint-summaries
        - operational-analysis
        - business-knowledge
      still_forbidden:
        - unrelated-general-purpose-work
        - secret-access
        - payment-mutation
        - cross-workspace-access

effective_scope:
  calculation: intersection-of-platform-profile-and-agent-subset

  agent_may:
    - disable-capability
    - disable-adjacent-topic
    - lower-small-talk-limit
    - lower-adjacent-limit
    - lower-classifier-budget
    - strengthen-refusal
    - strengthen-cooldown

  agent_may_not:
    - add-capability-outside-profile
    - increase-limit-above-profile
    - disable-unsafe-control
    - enable-rag-for-denied
    - enable-embedding-for-denied
    - enable-tools-for-denied
    - enable-full-agent-for-denied
    - grant-payment-mutation
    - broaden-platform-maximum-through-prompt

classifier:
  type: lightweight-structured-scope-classifier
  preferred_provider: local-openai-compatible
  tools_enabled: false
  rag_enabled: false
  database_credentials_available: false
  chain_of_thought_requested: false
  strict_json_output: true
  cancellation_supported: true

  default_budget:
    recent_turns_max: 4
    output_tokens_max: 128
    timeout_ms: 2500
    temperature_min: 0
    temperature_max: 0.2
    retry_on_malformed_output: 1

  allowed_input:
    - policy-profile-id
    - policy-profile-version
    - channel
    - current-message
    - bounded-recent-turns
    - compact-commerce-state-labels
    - scope-counters

  forbidden_input:
    - full-conversation-history
    - full-customer-profile
    - full-customer-memory
    - full-product-catalog
    - rag-documents
    - full-tool-schemas
    - raw-payment-payload
    - provider-secrets
    - authorization-headers
    - cross-workspace-data

  confidence_policy:
    accept_at_or_above: 0.80
    clarify_from: 0.55
    clarify_below: 0.55
    maximum_clarification_attempts: 1
    after_failed_clarification: fixed-scope-redirect

  malformed_output_policy:
    retry_max: 1
    final_fallback: CLARIFY
    full_agent_fallback_allowed: false

scope_policy_engine:
  authority: final-scope-decision
  model_is_authority: false
  framework_independent: true
  fail_closed: true

  inputs:
    - deterministic-proposal
    - classifier-proposal
    - effective-policy-profile
    - agent-narrowing
    - confidence
    - security-signals
    - human-takeover-state
    - compact-commerce-state
    - scope-counters
    - cooldown-state

  mandatory_overrides:
    payment_mutation: DENY_UNSAFE
    secret_request: DENY_UNSAFE
    cross_workspace_request: DENY_UNSAFE
    hidden_tool_request: DENY_UNSAFE
    admin_impersonation: DENY_UNSAFE
    active_human_takeover: suppress-customer-ai-response
    missing_profile: fail-closed
    invalid_decision: fail-closed
    internal_exception: fail-closed

business_adjacent_policy:
  allowed_only_when:
    - relevant-to-product-or-purchase-decision
    - supported-by-official-knowledge-or-backend-data

  medical_boundary:
    official-ingredient-facts: allowed
    official-allergen-facts: allowed
    official-caffeine-facts: allowed
    official-dietary-facts: allowed
    personal-diagnosis: denied
    medical-treatment-advice: denied
    allergy-safety-guarantee-without-evidence: denied
    serious-allergy: direct-to-outlet-or-human
    emergency-language: advise-appropriate-emergency-help

  mutation_tools_allowed: false
  default_max_consecutive_turns: 2
  after_limit: redirect-to-product-or-customer-service

small_talk_policy:
  enabled: true
  default_max_consecutive_turns: 1
  default_processing: fixed-template
  rag_allowed: false
  embedding_allowed: false
  tools_allowed: false
  full_agent_allowed: false
  redirect_to_business: true

  reset_on:
    - valid-business-request
    - commerce-flow-start
    - support-request
    - new-session

clarification_policy:
  maximum_attempts: 1
  mutation_tools_allowed: false
  broad_rag_allowed: false
  full_agent_allowed: false
  preferred_processing: deterministic-context-specific-template

  examples:
    street_without_city:
      decision: CLARIFY
      clarification_code: ASK_CITY

    city_without_detail:
      decision: CLARIFY
      clarification_code: ASK_STREET_AREA_OR_LANDMARK

    ambiguous_short_message:
      decision: CLARIFY
      clarification_code: ASK_CONTEXT_SPECIFIC_DETAIL

  after_exhaustion:
    response: fixed-scope-redirect
    off_topic_counter_increment: false

off_topic_policy:
  response_mode: fixed-deterministic
  rag_allowed: false
  embedding_allowed: false
  tool_schema_allowed: false
  tools_allowed: false
  full_agent_allowed: false
  memory_extraction_allowed: false
  automatic_human_handoff: false
  original_message_retention: existing-chat-retention-policy

  attempts:
    first:
      action: friendly-refusal

    second:
      action: shorter-refusal-and-business-redirect

    third:
      action: cooldown
      cooldown_seconds: 60

    continued:
      action: capped-increasing-cooldown
      maximum_seconds: 300

unsafe_policy:
  response_mode: fixed-safe-refusal
  rag_allowed: false
  embedding_allowed: false
  tool_schema_allowed: false
  tools_allowed: false
  full_agent_allowed: false
