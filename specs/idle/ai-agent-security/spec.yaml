# SelaluTeh AI Agent Scope Security and Cost Guard Specification
#
# Spec ini khusus untuk business-domain confinement, off-topic protection,
# unsafe-request handling, dan AI cost guard.
#
# Spec ini TIDAK menggantikan atau menggabungkan:
# - selaluteh-ai-agent-architecture
# - selaluteh-backend-marketplace
#
# Existing AI architecture tetap menjadi pemilik memory, RAG implementation,
# model routing, AI orchestration, Tool Gateway, dan human takeover.
#
schema_version: 2
spec_version: 1.0.0

id: selaluteh-ai-agent-scope-security
title: SelaluTeh AI Agent Scope Security and Cost Guard
description: >-
  Requirements-first specification khusus untuk memastikan customer-facing AI
  SelaluTeh tetap berada dalam domain bisnis yang disetujui, tidak berubah
  menjadi general-purpose chatbot, tidak menjalankan RAG, embedding, tools,
  atau full AI Agent untuk request off-topic atau unsafe, serta menggunakan
  processing tier paling murah yang tetap benar dan aman. Spec ini mengatur
  deterministic filtering, lightweight scope classification, immutable
  platform maximum scope, policy profiles, agent scope narrowing, off-topic
  refusal, unsafe handling, small-talk limits, clarification, cooldown,
  capability gating, cost controls, observability, rollout, dan pengujian TDD.

